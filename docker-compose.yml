version: '3.8'

services:
  # 1. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: africhina_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-160907}
      POSTGRES_DB: ${DB_NAME:-africhina}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - africhina_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Backend (Node.js + Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: africhina_backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-160907}@db:5432/${DB_NAME:-africhina}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_change_in_prod}
      NODE_ENV: production
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - africhina_net
    expose:
      - "5000"

  # 3. Frontend (Vue 3 + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: africhina_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - africhina_net

networks:
  africhina_net:
    driver: bridge

volumes:
  pgdata: